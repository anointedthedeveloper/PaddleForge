<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaddleForge – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 2rem; color: #00e5ff; text-shadow: 0 0 20px #00e5ff; letter-spacing: 4px; }
    p { color: rgba(255,255,255,0.5); font-size: 0.95rem; letter-spacing: 1px; }
    a {
      margin-top: 8px;
      padding: 12px 32px;
      background: #00e5ff;
      color: #0a0a0f;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>PaddleForge</h1>
  <p>You're offline. Connect to the internet to play.</p>
  <a href="/">Try Again</a>
</body>
</html>
